/* ---------- HERO + VIDEO BG ---------- */
function Hero() {
  const videoRef = useRef(null);
  const wrapRef  = useRef(null);
  const [shown, setShown] = useState(false);

  useEffect(() => {
    setShown(true);
    const s = { tx:0, ty:0, cx:0, cy:0 };
    const onMove = (e) => {
      const cxv = window.innerWidth/2, cyv = window.innerHeight/2;
      s.tx = ((e.clientX - cxv)/cxv) * 14;
      s.ty = ((e.clientY - cyv)/cyv) * 14;
    };
    window.addEventListener('mousemove', onMove);
    let raf;
    const loop = () => {
      s.cx += (s.tx - s.cx)*0.06;
      s.cy += (s.ty - s.cy)*0.06;
      if (wrapRef.current && window.gsap) window.gsap.set(wrapRef.current, { x: s.cx, y: s.cy });
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, []);

  const onLoaded = () => { if (videoRef.current) videoRef.current.playbackRate = 1.15; };

  return (
    <section className="relative min-h-screen w-full overflow-hidden">
      {/* Video bg */}

        />

      </div>

      <div aria-hidden className="hidden lg:block absolute -right-8 bottom-40 z-[1] w-[380px] h-[380px] rounded-full opacity-25" style={{background:"radial-gradient(circle, oklch(0.7 0.12 200) 0%, transparent 65%)", filter:"blur(60px)"}}/>

          <span className="w-1.5 h-1.5 rounded-full" style={{background:'var(--coral)'}}></span>
          <span className="text-white/80">2025 ÖSYM VERİLERİ · CANLI</span>
        </div>

        <h1 className="font-inter hero-line font-normal text-white max-w-[1100px] mx-auto">
          Geleceğinizi <span className="font-serif-i text-white/85">birlikte</span> tasarlayalım.
        </h1>

          Türkiye'nin en kapsamlı üniversite tercih robotu — sıralamanızdan başlayın,

/* ---------- Form atoms ---------- */
function Label({ children, required }) {
  return (
    <label className="text-[10px] font-medium text-white/55 flex items-center gap-1" style={{letterSpacing:'0.16em'}}>
      <span>{children?.toString().toUpperCase()}</span>
      {required && <span className="text-[color:var(--coral)]">*</span>}
    </label>
  );
}
function Field({ label, required, children, hint }) {
  return (
    <div className="bg-white/[0.025] border border-white/10 rounded-2xl px-4 py-3 focus-within:border-white/40 transition-colors">
      <Label required={required}>{label}</Label>
      <div className="mt-1">{children}</div>
    </div>
  );
}
function CheckChip({ name, value, label, defaultChecked }) {
  return (
    <label className="check-chip cursor-pointer inline-flex items-center gap-2 border border-white/15 rounded-full px-4 py-2 text-[13px] text-white/85 hover:text-white transition">
      <input type="checkbox" name={name} value={value} defaultChecked={defaultChecked} className="sr-only"/>
      <span className="dot w-3 h-3 rounded-full border border-white/30 inline-block transition-colors"></span>
      <span>{label}</span>
    </label>
  );
}
function Combobox({ name, placeholder, options }) {
  const [v, setV] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  const filtered = options.filter(o => o.toLowerCase().includes(v.toLowerCase())).slice(0,6);
  return (
    <div className="relative" ref={ref}>
      <input
        type="text" name={name} value={v} placeholder={placeholder}
        onChange={e => { setV(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        autoComplete="off"
        className="w-full bg-transparent outline-none text-[15px] py-2 placeholder:text-white/35"
      />
      {open && filtered.length > 0 && (
        <div className="absolute left-0 right-0 top-full mt-2 z-30 liquid-glass rounded-xl py-1 max-h-[220px] overflow-auto bg-black/80">
          {filtered.map(o => (
            <button type="button" key={o}
              className="w-full text-left px-4 py-2 text-[14px] text-white/85 hover:bg-white/10"
              onClick={() => { setV(o); setOpen(false); }}>
              {o}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------- FEATURE 02 — TREND CHART ---------- */
function TrendChart() {
  const data = [
    { y:2021, v:243431 },
    { y:2022, v:198122 },
    { y:2023, v:142880 },
    { y:2024, v:98443  },
    { y:2025, v:66687  },
  ];
  const W=520, H=220, padX=44, padY=24;
  const maxV = 250000;
  const x = (i) => padX + (i*(W-padX-12))/(data.length-1);
  const y = (v) => padY + (1 - v/maxV)*(H-padY*2);
  const pts = data.map((d,i) => `${x(i)},${y(d.v)}`).join(' ');
  const area = `M ${x(0)},${H-padY} L ${pts.replaceAll(' ',' L ')} L ${x(data.length-1)},${H-padY} Z`.replace(/L\s+L/g,'L');

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
      <defs>
        <linearGradient id="coralFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="oklch(0.74 0.14 35)" stopOpacity="0.45"/>
          <stop offset="100%" stopColor="oklch(0.74 0.14 35)" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {/* gridlines */}
      {[50000,100000,150000,200000].map(g => (
        <g key={g}>
          <line x1={padX} x2={W-12} y1={y(g)} y2={y(g)} stroke="rgba(255,255,255,0.08)" strokeDasharray="2 4"/>
          <text x={padX-8} y={y(g)+3} fontFamily="JetBrains Mono" fontSize="9" fill="rgba(255,255,255,0.4)" textAnchor="end">{(g/1000)}K</text>
        </g>
      ))}
      {/* x labels */}
      {data.map((d,i) => (
        <text key={d.y} x={x(i)} y={H-6} fontFamily="JetBrains Mono" fontSize="9" fill="rgba(255,255,255,0.5)" textAnchor="middle">{d.y}</text>
      ))}
      {/* area */}
      <path d={`M ${data.map((d,i)=>`${i===0?'':'L '}${x(i)} ${y(d.v)}`).join(' ')} L ${x(data.length-1)} ${H-padY} L ${x(0)} ${H-padY} Z`} fill="url(#coralFill)"/>
      {/* line */}
      <polyline points={pts} fill="none" stroke="oklch(0.74 0.14 35)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {/* dots */}
      {data.map((d,i) => (
        <g key={d.y}>
          <circle cx={x(i)} cy={y(d.v)} r="3.5" fill="#000" stroke="oklch(0.74 0.14 35)" strokeWidth="2"/>
        </g>
      ))}
    </svg>
  );
}
